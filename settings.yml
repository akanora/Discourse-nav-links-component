nav_links:
  type: objects
  default:
    - display_name: Latest
      title: topics with recent posts
      url: /latest
    - display_name: Categories
      title: all topics grouped by category
      url: /categories
    - display_name: Top
      title: the most active topics in the last year, month, week or day
      url: /top
  schema:
    name: link
    identifier: display_name
    properties:
      display_name:
        type: string
        required: true
        validations:
          min_length: 1
          max_length: 100
      title:
        type: string
        validations:
          min_length: 1
          max_length: 1000
      url:
        type: string
        required: true
        validations:
          min_length: 1
          max_length: 2048
          url: true
      translations:
        type: objects
        schema:
          name: translation
          identifier: locale
          properties:
            locale:
              type: enum
              required: true
              choices:
                - ar
                - be
                - bg
                - bs_BA
                - ca
                - cs
                - da
                - de
                - el
                - en
                - en_GB
                - es
                - et
                - fa_IR
                - fi
                - fr
                - gl
                - he
                - hr
                - hu
                - hy
                - id
                - it
                - ja
                - ko
                - lt
                - lv
                - nb_NO
                - nl
                - pl_PL
                - pt
                - pt_BR
                - ro
                - ru
                - sk
                - sl
                - sq
                - sr
                - sv
                - sw
                - te
                - th
                - tr_TR
                - ug
                - uk
                - ur
                - vi
                - zh_CN
                - zh_TW
            display_name:
              type: string
              validations:
                max_length: 100
            title:
              type: string
              validations:
                max_length: 1000
Hide_dropdowns:
  default: false
  description:
    en: "Hide category and tag dropdowns"
Hide_default_links:
  default: false
  description:
    en: "Hide the default links on both mobile and desktop."
Show_counts:
  default: false
  description:
    en: "Show topic counts for links pointing to /new or /unread (e.g. New (24))."
